<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="amount()">increment</button>
    <button onclick="amount1()">decrement</button>


    <script>
           let money = 0;

     
        function amount(){
           money = money +1;
           console.log(money);
           
        }
        function amount1(){
              money = money -1;
           console.log(money);
        }

           

    </script>
    
</body>
</html>
